name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'

      # এই স্টেপটি আপনার প্রোজেক্টের অভাব পূরণ করবে
      - name: Create Flutter Project Structure
        run: |
          # বর্তমান ফাইলগুলো সরিয়ে রাখা
          mkdir temp_files
          mv lib pubspec.yaml temp_files/
          
          # নতুন প্রোজেক্ট তৈরি করা (যা অ্যান্ড্রয়েড ফোল্ডার তৈরি করবে)
          flutter create --project-name my_note_app .
          
          # আপনার আসল ফাইলগুলো আবার ফিরিয়ে আনা
          rm -rf lib/main.dart pubspec.yaml
          cp temp_files/main.dart lib/main.dart
          cp temp_files/pubspec.yaml pubspec.yaml
          rm -rf temp_files

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-note-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

