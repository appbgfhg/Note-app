name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'

      - name: Reconstruct Project and Build
        run: |
          # ১. আপনার কোডগুলো ব্যাকআপ রাখা
          mkdir backup_dir
          find . -name "pubspec.yaml" -exec cp {} backup_dir/ \;
          find . -name "main.dart" -exec cp {} backup_dir/ \;

          # ২. বর্তমান ডিরেক্টরি পুরোপুরি পরিষ্কার করা (গিট বাদে)
          find . -maxdepth 1 ! -name 'backup_dir' ! -name '.git' ! -name '.' -exec rm -rf {} +

          # ৩. নতুন ফ্লাটার প্রোজেক্ট তৈরি করা অন্য একটি ফোল্ডারে এবং সেটি এখানে মুভ করা
          flutter create --project-name my_note_app tmp_app
          cp -r tmp_app/. .
          rm -rf tmp_app

          # ৪. আপনার আসল কোডগুলো বসিয়ে দেওয়া
          cp backup_dir/pubspec.yaml ./pubspec.yaml
          cp backup_dir/main.dart ./lib/main.dart
          rm -rf backup_dir

          # ৫. ডিপেন্ডেন্সি নিয়ে আসা এবং বিল্ড করা
          flutter pub get
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-note-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

