name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'

      - name: Reconstruct Project and Build
        run: |
          # ১. ব্যাকআপ রাখা
          mkdir backup_dir
          find . -maxdepth 1 -name "pubspec.yaml" -exec cp {} backup_dir/ \;
          find . -maxdepth 2 -name "main.dart" -exec cp {} backup_dir/ \;
          if [ -f "logo.jpg" ]; then cp logo.jpg backup_dir/; fi

          # ২. ডিরেক্টরি ক্লিন
          find . -maxdepth 1 ! -name 'backup_dir' ! -name '.git' ! -name '.' -exec rm -rf {} +

          # ৩. নতুন প্রোজেক্ট তৈরি
          flutter create --project-name my_note_app tmp_app
          cp -r tmp_app/. .
          rm -rf tmp_app

          # ৪. কোড ও এসেট ইনজেকশন
          cp backup_dir/pubspec.yaml ./pubspec.yaml
          cp backup_dir/main.dart ./lib/main.dart
          if [ -f "backup_dir/logo.jpg" ]; then 
            mkdir -p assets
            cp backup_dir/logo.jpg assets/
            # pubspec এ এসেট রেজিস্টার করা
            sed i "/flutter:/a \  assets:\n    - assets/logo.jpg" pubspec.yaml
          fi
          rm -rf backup_dir

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hacker-note-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

