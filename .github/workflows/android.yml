name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'

      - name: Create Flutter Project Structure
        run: |
          # অস্থায়ী ফোল্ডার তৈরি
          mkdir temp_dir
          
          # pubspec.yaml এবং মেইন ডার্ট ফাইল খুঁজে বের করে কপি করা
          find . -name "pubspec.yaml" -exec cp {} temp_dir/ \;
          find . -name "main.dart" -exec cp {} temp_dir/ \;
          
          # বর্তমান ডিরেক্টরি পরিষ্কার করা (গিট ফাইল বাদে)
          find . -maxdepth 1 ! -name 'temp_dir' ! -name '.git' ! -name '.' -exec rm -rf {} +
          
          # নতুন ফ্লাটার প্রোজেক্ট তৈরি
          flutter create --project-name my_note_app . --force
          
          # আপনার ফাইলগুলো সঠিক জায়গায় বসানো
          cp temp_dir/pubspec.yaml ./pubspec.yaml
          cp temp_dir/main.dart ./lib/main.dart
          
          # পরিষ্কার করা
          rm -rf temp_dir

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-note-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

