name: Build Flutter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
          channel: 'stable'

      - name: Reconstruct Project and Build
        run: |
          # ১. ব্যাকআপ রাখা (মেইন কোড এবং লোগো)
          mkdir backup_dir
          find . -maxdepth 2 -name "main.dart" -exec cp {} backup_dir/ \;
          if [ -f "logo.jpg" ]; then cp logo.jpg backup_dir/; fi

          # ২. ডিরেক্টরি ক্লিন (গিট বাদে সব মুছে ফেলা)
          find . -maxdepth 1 ! -name 'backup_dir' ! -name '.git' ! -name '.' -exec rm -rf {} +

          # ৩. নতুন ফ্রেশ ফ্লাটার প্রোজেক্ট তৈরি
          flutter create --project-name my_note_app tmp_app
          cp -r tmp_app/. .
          rm -rf tmp_app

          # ৪. আপনার আসল কোড ইনজেক্ট করা
          cp backup_dir/main.dart ./lib/main.dart

          # ৫. লোগো ও এসেট সেটআপ (যদি থাকে)
          if [ -f "backup_dir/logo.jpg" ]; then 
            mkdir -p assets
            cp backup_dir/logo.jpg assets/
          fi

          # ৬. নতুন pubspec.yaml তৈরি (sed এরর এড়াতে সরাসরি রাইট করা)
          cat <<EOF > pubspec.yaml
          name: my_note_app
          description: A simple note app built with Flutter.
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.2
          flutter:
            uses-material-design: true
            assets:
              - assets/logo.jpg
          EOF

          rm -rf backup_dir

          # ৭. বিল্ড শুরু
          flutter pub get
          flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hacker-note-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

